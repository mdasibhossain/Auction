<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Auction Card</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            /* ফিল্টার আর কার্ড নিচে নিচে রাখার জন্য */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #060b13 0%, #0a1120 50%, #020408 100%) !important;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            padding: 20px;
        }

        /* ফিল্টার সেকশনের প্রিমিয়াম স্টাইল */
        .filter-section {
            width: 100%;
            max-width: 900px;
            margin-bottom: 25px;
            background: rgba(10, 17, 32, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        #card {
            width: 100%;
            max-width: 900px;
            background: rgba(10, 17, 32, 0.7) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(59, 130, 246, 0.05);
            transition: all 0.4s ease;
        }

        #card:hover {
            transform: translateY(-5px);
            border-color: rgba(59, 130, 246, 0.25);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6),
                0 0 50px rgba(59, 130, 246, 0.12);
        }

        .img-container {
            position: relative;
            height: 100%;
            min-height: 380px;
            overflow: hidden;
            background: rgba(15, 23, 42, 0.6);
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        #card:hover .img-container img {
            transform: scale(1.04);
        }

        .live-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(239, 68, 68, 0.9);
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 10;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: white;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.8);
                opacity: 0.5;
            }

            50% {
                transform: scale(1.2);
                opacity: 1;
            }

            100% {
                transform: scale(0.8);
                opacity: 0.5;
            }
        }

        .card-body {
            padding: 40px !important;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        .card-title {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 25px;
            background: linear-gradient(45deg, #ffffff, #a2c2f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #64748b;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .info-value {
            color: #f1f5f9;
            font-size: 1.05rem;
            font-weight: 600;
        }

        /* বাটন অ্যাকশন এরিয়া */
        .action-wrapper {
            margin-top: 30px;
        }

        .btn-action {
            font-weight: 600;
            padding: 12px 25px;
            border-radius: 12px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
        }

        .btn-sold {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
        }

        .btn-sold:hover:not([disabled]) {
            background: linear-gradient(135deg, #059669, #047857);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-skip {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.2);
        }

        .btn-skip:hover:not([disabled]) {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
        }
    </style>
</head>

<body>
    <a href="/dashboard"
        style="display: block; width: fit-content; margin-left: 0; margin-right: auto; margin-bottom: 20px; color: #38bdf8; text-decoration: none;">
        ← Back to Dashboard
    </a>


    <div class="filter-section">

        <form action="/live-auction" method="GET"
            class="d-flex align-items-center justify-content-between gap-3 flex-wrap">
            <div class="d-flex align-items-center gap-2">
                <i class="fa-solid fa-filter text-primary"></i>
                <label style="color: #94a3b8; font-weight: 500;">Select Auction Pool:</label>
            </div>
            <div class="d-flex gap-3 align-items-center">
                <select name="category"
                    style="background: #0f172a; color: white; border: 1px solid rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 8px; font-weight: 500;">
                    <option value="">All Categories</option>
                    <option value="Team-Owner">Team-Owner</option>
                    <option value="Epic">Epic</option>
                    <option value="Icon">Icon</option>
                    <option value="Grade-A">Grade-A</option>
                    <option value="Grade-B">Grade-B</option>
                    <option value="Grade-C">Grade-C</option>
                </select>
                <button type="submit" class="btn btn-primary px-4" style="border-radius: 8px; font-weight: 600;">Start
                    Bidding</button>
            </div>
        </form>
    </div>

    <div class="card mb-3" id="card">
        <div class="row g-0 align-items-center">

            <div class="col-md-5">
                <div class="img-container">
                    <div class="live-badge">
                        <div class="live-dot"></div> Live Bidding
                    </div>
                   <img src="<%= PLAYER_IMAGE %>" alt="Player Image">
                </div>
            </div>

            <div class="col-md-7">
                <div class="card-body">
                    <div>
                        <h2 class="card-title"><i class="fa-solid fa-id-card me-2"></i>Player Profile</h2>

                        <div class="card-text mt-4">
                            <div class="info-row">
                                <span class="info-label"><i class="fa-solid fa-user me-2"></i> Player Name</span>
                                <span class="info-value" id="name">__PLAYER_NAME__</span>
                            </div>

                            <div class="info-row">
                                <span class="info-label"><i class="fa-solid fa-tags me-2"></i> Category</span>
                                <span class="info-value text-primary" id="category"
                                    style="font-weight: 700;">__PLAYER_CATEGORY__</span>
                            </div>

                            <div class="info-row">
                                <span class="info-label"><i class="fa-solid fa-briefcase me-2"></i> Player
                                    Position</span>
                                <span class="info-value" id="position">__PLAYER_POSITION__</span>
                            </div>

                            <div class="info-row">
                                <span class="info-label"><i class="fa-solid fa-graduation-cap me-2"></i> Batch</span>
                                <span class="info-value" id="batch">__PLAYER_BATCH__</span>
                            </div>
                        </div>
                    </div>
                    <form action="__FORM_ACTION__" method="POST"
                        style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">

                        <div style="width: 100px;">
                            <input type="number" name="bidPrice" placeholder="Bid"
                                style="background: #0f172a; color: white; border: 1px solid rgba(255,255,255,0.2); height: 45px; border-radius: 10px; width: 100%; padding: 0 10px;">
                        </div>

                        <div style="flex-grow: 1; max-width: 150px;">
                            <select name="teamName" class="form-select"
                                style="background: #0f172a; color: white; border: 1px solid rgba(255,255,255,0.2); height: 45px; border-radius: 10px; width: 100%; padding: 0 10px;">
                                <option value="" disabled selected>Team select</option>
                                {{TEAM_OPTIONS}}
                            </select>
                        </div>

                        <button type="submit" class="btn-action btn-sold" __DISABLE_SOLD__ style="height: 45px;">
                            <i class="fa-solid fa-gavel"></i> Sold
                        </button>

                        <button type="submit" formaction="__FORM_UNSOLD_ACTION__" class="btn-action btn-skip"
                            __DISABLE_UNSOLD__ style="height: 45px;">
                            <i class="fa-solid fa-circle-xmark"></i> Unsold
                        </button>
                    </form>

                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
