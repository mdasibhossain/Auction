<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Login - Auction Panel</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            
           
            background: linear-gradient(135deg, #060b13 0%, #0a1120 50%, #020408 100%); 
            
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        #login {
            width: 100%;
            max-width: 420px;
            padding: 50px 40px;
            border-radius: 24px;
          
            background: rgba(10, 17, 32, 0.75); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            
           
            border: 1px solid rgba(255, 255, 255, 0.05); 
            
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4), 
                        0 0 40px rgba(59, 130, 246, 0.06); 
                        
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #login:hover {
            transform: translateY(-8px);
            border-color: rgba(59, 130, 246, 0.25);
     
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), 
                        0 0 50px rgba(59, 130, 246, 0.15); 
        }

        h2 {
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            color: #ffffff;
            text-align: center;
            font-size: 1.8rem;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 35px;
            font-weight: 400;
        }

  
        .form-floating {
            margin-bottom: 20px;
        }

        .form-floating .form-control {
            background-color: rgba(15, 23, 42, 0.6); 
            border: 1px solid rgba(51, 65, 85, 0.7);
            color: #ffffff;
            border-radius: 14px;
            padding-left: 16px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background-color: #0f172a;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
            color: #ffffff;
        }

      
        .form-floating label {
            color: #64748b;
            padding-left: 16px;
        }

        .form-floating .form-control:focus ~ label,
        .form-floating .form-control:not(:placeholder-shown) ~ label {
            color: #3b82f6 !important;
            transform: scale(0.85) translateY(-0.75rem) translateX(0.15rem);
        }

        .btn-custom {
            background: #3b82f6;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none;
            color: white;
            font-weight: 600;
            padding: 15px;
            border-radius: 14px;
            width: 100%;
            font-size: 1rem;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            margin-top: 10px;
        }

        .btn-custom:hover {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            box-shadow: 0 6px 24px rgba(37, 99, 235, 0.4);
            transform: translateY(-2px);
        }

        .btn-custom:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <form action="/login" method="POST">

    <div id="login">
        <h2>Welcome Back</h2>
        <div class="subtitle">Enter your details to access the auction panel</div>
        
        <div class="form-floating">
            <input type="email" name="email" class="form-control" id="floatingInput" placeholder="name@example.com" autocomplete="off">
            <label for="floatingInput">Email address</label>
        </div>
        
        <div class="form-floating">
            <input type="password" name="password" class="form-control" id="floatingPassword" placeholder="Password">
            <label for="floatingPassword">Password</label>
        </div>
        
        <button type="submit" class="btn btn-custom" id="loginButton">Sign In</button>
    </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    

</body>
</html>
